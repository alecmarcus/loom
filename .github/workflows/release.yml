name: Release

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag release
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "${{ steps.version.outputs.tag }}" | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "$PREV_TAG"..HEAD | sed 's/^/- /')
          else
            NOTES="Initial release"
          fi

          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Loom ${{ steps.version.outputs.tag }}" \
            --notes "$NOTES"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync marketplace version
        if: steps.check.outputs.exists == 'false'
        continue-on-error: true
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git clone --depth 1 "https://x-access-token:${MARKETPLACE_TOKEN}@github.com/alecmarcus/claude-plugins.git" /tmp/marketplace
          cd /tmp/marketplace

          jq --arg v "$VERSION" '
            .plugins |= map(
              if .name == "loom" then .version = $v else . end
            )
          ' .claude-plugin/marketplace.json > /tmp/updated.json
          mv /tmp/updated.json .claude-plugin/marketplace.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump loom to v${VERSION}"
          git push
        env:
          MARKETPLACE_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
